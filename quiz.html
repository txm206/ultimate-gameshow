/* =========================
   AUDIO
========================= */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let soundEnabled = localStorage.getItem("soundEnabled") !== "false";

function playTone(freq, dur, type = "sine", vol = 0.2) {
    if (!soundEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}

function playCorrectSound() {
    playTone(880, 0.15);
    setTimeout(() => playTone(1320, 0.12), 150);
}
function playWrongSound() {
    playTone(220, 0.3, "square");
}
function playClickSound() {
    playTone(600, 0.05, "triangle", 0.15);
}
function toggleSound() {
    soundEnabled = !soundEnabled;
    localStorage.setItem("soundEnabled", soundEnabled);
    document.getElementById("soundToggle").innerText =
        soundEnabled ? "🔊" : "🔇";
}

/* =========================
   VARIABLEN
========================= */
let quiz = [];
let currentQuestion = 0;
let locked = false;
let currentLevel = "";
let score = 0;
let timerInterval;
let timeLeft;

function increaseGamesPlayed() {
    let games = localStorage.getItem("games_played") || 0;
    localStorage.setItem("games_played", parseInt(games) + 1);
}


/* =========================
   SHUFFLE
========================= */
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

/* =========================
   QUIZ START
========================= */
function startQuiz(level) {
    increaseGamesPlayed();
    playClickSound();
    currentLevel = level;
    score = 0;
    document.getElementById("score").innerText = "Score: 0";

    // Alle Fragen dieses Levels holen
    const levelQuestions =
        allQuestions.filter(q => q.level === level);

    // Mischen
    shuffleArray(levelQuestions);

    // Nur 20 pro Runde
    quiz = levelQuestions.slice(0, 20);

    currentQuestion = 0;

    document.getElementById("difficultySelect").style.display = "none";
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("quizArea").style.display = "block";

    loadQuestion();
}


/* =========================
   FRAGE LADEN
========================= */
function loadQuestion() {
    locked = false;

    document.getElementById("progress").innerText =
        `Frage ${currentQuestion + 1} / ${quiz.length}`;

    document.getElementById("progressFill").style.width =
        (currentQuestion / quiz.length) * 100 + "%";

    document.getElementById("feedback").innerHTML = "";
    document.getElementById("nextBtn").style.display = "none";

    const q = quiz[currentQuestion];
    document.getElementById("question").innerText = q.question;

    const shuffledAnswers = q.answers.map((text, i) => ({
        text,
        isCorrect: i === q.correct
    }));
    shuffleArray(shuffledAnswers);

    shuffledAnswers.forEach((ans, i) => {
        const btn = document.getElementById("a" + i);
        btn.innerText = ans.text;
        btn.disabled = false;
        btn.style.backgroundColor = "";
        btn.dataset.correct = ans.isCorrect;
    });

    startTimer();
}

/* =========================
   TIMER
========================= */
function startTimer() {
    clearInterval(timerInterval);

    if (currentLevel === "leicht") timeLeft = 40;
    else if (currentLevel === "mittel") timeLeft = 30;
    else if (currentLevel === "schwer") timeLeft = 20;
    else if (currentLevel === "ultra") timeLeft = 15;

    document.getElementById("timer").style.color = "#8b949e";
    document.getElementById("timer").innerText = `⏱️ Zeit: ${timeLeft}s`;

    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = `⏱️ Zeit: ${timeLeft}s`;
        if (timeLeft <= 5)
            document.getElementById("timer").style.color = "#f85149";
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timeUp();
        }
    }, 1000);
}

function timeUp() {
    if (locked) return;
    locked = true;
    playWrongSound();

    const correctBtn =
        document.querySelector('button[data-correct="true"]');
    correctBtn.classList.add("time-up");
    correctBtn.style.backgroundColor = "#238636";

    document.getElementById("feedback").innerHTML =
        "<div style='color:#f85149;font-size:20px;'>⏰ Zeit abgelaufen!</div>";

    document.getElementById("nextBtn").style.display = "inline-block";
}

/* =========================
   ANTWORT
========================= */
function answer(index) {
    if (locked) return;
    locked = true;
    clearInterval(timerInterval);

    const clickedBtn = document.getElementById("a" + index);
    const isCorrect = clickedBtn.dataset.correct === "true";

    if (isCorrect) {
        playCorrectSound();

        let mult = 1;
        if (currentLevel === "mittel") mult = 1.5;
        if (currentLevel === "schwer") mult = 2;
        if (currentLevel === "ultra") mult = 3;

        const points = Math.round((100 + timeLeft * 5) * mult);
        score += points;
        document.getElementById("score").innerText = `Score: ${score}`;

        const popup = document.getElementById("scorePopup");
        popup.innerText = `+${points}`;
        popup.classList.remove("score-popup-show");
        void popup.offsetWidth;
        popup.classList.add("score-popup-show");

        clickedBtn.classList.add("correct");
        clickedBtn.style.backgroundColor = "#238636";

        document.getElementById("feedback").innerHTML =
            "<div style='color:#3fb950;font-size:20px;'>✔ Richtig!</div>";
    } else {
        playWrongSound();

        clickedBtn.classList.add("wrong");
        clickedBtn.style.backgroundColor = "#da3633";

        const correctBtn =
            document.querySelector('button[data-correct="true"]');
        correctBtn.style.backgroundColor = "#238636";

        document.getElementById("feedback").innerHTML =
            "<div style='color:#f85149;font-size:20px;'>✖ Falsch</div>";
    }

    document.getElementById("nextBtn").style.display = "inline-block";
}

/* =========================
   NÄCHSTE FRAGE
========================= */
function nextQuestion() {
    playClickSound();
    currentQuestion++;

    if (currentQuestion >= quiz.length) {
        const key = `quiz_highscore_${currentLevel}`;
        const saved = localStorage.getItem(key) || 0;

        if (score > saved) {
            localStorage.setItem(key, score);
        }

        document.getElementById("highscoreText").innerText =
            `Highscore (${currentLevel}): ${localStorage.getItem(key)}`;

        document.getElementById("quizArea").style.display = "none";
        document.getElementById("endScreen").style.display = "block";
    } else {
        loadQuestion();
    }
}

/* =========================
   RESTART / ZURÜCK
========================= */
function restartSameDifficulty() {

    playClickSound();
    score = 0;
    document.getElementById("score").innerText = "Score: 0";

    currentQuestion = 0;
    shuffleArray(quiz);
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("quizArea").style.display = "block";
    loadQuestion();
}
function showDifficultySelect() {
    playClickSound();
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("difficultySelect").style.display = "block";
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}
