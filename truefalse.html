<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>True or False</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-512.png">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="quiz-page">

<div class="quiz-container">

    <h1>✔️ True or False ❌</h1>

    <div id="tfTop"
         style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <div id="tfStreak">Streak: 0</div>
        <div id="tfTimer">⏱️ 5</div>
    </div>

    <div class="question" id="tfQuestion"></div>

    <div class="answers">
        <button onclick="answerTF(true)" class="correct">
            ✔️ Richtig
        </button>
        <button onclick="answerTF(false)" class="wrong">
            ❌ Falsch
        </button>
    </div>

    <div id="tfFeedback"
         style="margin-top:20px; text-align:center;"></div>

    <div id="tfEnd"
         style="display:none; text-align:center; margin-top:25px;">
         <h2 id="tfEndTitle">💥 Game Over</h2>
         <p id="tfResult"></p>
         

        <button onclick="startTF()" class="end-btn secondary">
            🔁 Nochmal spielen
        </button>

        <br><br>

        <button onclick="window.location.href='index.html'"
                class="end-btn primary">
            ⬅ Zurück zur Übersicht
        </button>
    </div>

</div>

<script src="truefalse.js"></script>
</body>
</html>
